# =============================================================================
# DINOv3-style detection transfer — FULL Objects365 + FULL COCO train2017
#
# Same stage recipe as configs/schedules/dinov3_style.yaml (paper §6.3.1 + D.9):
#   1) obj365_lowres  — full Obj365 train, 22 ep, lr 5e-5, step /10 @ ep 20,
#                       focal, L1+GIoU(w=2), 1000-step warmup, multiscale proxy.
#   2) obj365_highres — same data, 4 ep, lr 2.5e-5 constant, same losses.
#   3) coco_finetune  — full COCO train2017 (~118k imgs), 12 ep, cosine to 0.1×lr,
#                       2000-step warmup (finishes in <1 ep @ bs=32), IA-BCE,
#                       weight_giou 4, classifier 365→80 via shape-tolerant load.
#
# Paths (you must have these on disk):
#   Objects365:  data/objects365/train  +  data/objects365/annotations/train.json
#   COCO train:  data/coco/train2017     +  data/coco/annotations/instances_train2017.json
#     The JSON alone is not enough — you need ~118k JPEGs from the official
#     train2017 zip. If img_dir is empty/wrong, the dataset drops to 0 images and
#     training aborts with a clear ValueError (or use train2017_subset for dev).
#   COCO val:    data/coco/val2017       +  data/coco/annotations/instances_val2017.json
#   COCO-O (stage-3 eval): optional; disable by removing robustness from stage 3 if missing.
#
# VRAM / OOM: bs=32 @ 256 fits ~9 GB head+ViT in prior notes. If OOM, lower ONLY
#   common_overrides.training.batch_size and scale lr linearly (e.g. bs 16 → lr 2.5e-5 → 1.25e-5).
#
# Run full pipeline:
#   conda activate akproj
#   cd <repo>
#   python schedule.py --schedule configs/schedules/dinov3_full_data.yaml
#
# Single stage:
#   python schedule.py --schedule configs/schedules/dinov3_full_data.yaml --only coco_finetune
# =============================================================================

name: dinov3_full_data
base_config: configs/default.yaml
output_root: checkpoints/schedules/dinov3_full_data
seed: 42

common_overrides:
  training:
    batch_size: 32
    weight_decay: 0.05
    max_grad_norm: 0.1
    amp: true
    num_workers: 8
  matcher:
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
  output:
    log_interval: 100
    save_interval: 5

eval_suites:
  in_domain:
    - name: coco
      img_dir: data/coco/val2017
      ann_file: data/coco/annotations/instances_val2017.json

  robustness:
    - name: coco_o
      img_dir: data/coco-o/images
      ann_file: data/coco-o/annotations/coco_o.json

stages:
  - name: obj365_lowres
    enabled: true
    init_from: null
    train:
      img_dir: data/objects365/train
      ann_file: data/objects365/annotations/train.json
    overrides:
      backbone:
        img_size: 256
      training:
        epochs: 22
        lr: 5.0e-5
        lr_schedule: step
        lr_drop: 20
        warmup_steps: 1000
      loss:
        cls_type: focal
        focal_alpha: 0.25
        focal_gamma: 2.0
        weight_cls: 2.0
        weight_bbox: 1.0
        weight_giou: 2.0
      augmentation:
        horizontal_flip: true
        color_jitter: false
        random_crop: true
        crop_min_scale: 0.6
        multiscale: [224, 240, 256]
    eval:
      suites: [in_domain]
      at_epochs: [1, 10, 20, 22]

  - name: obj365_highres
    enabled: true
    init_from: "@prev"
    train:
      img_dir: data/objects365/train
      ann_file: data/objects365/annotations/train.json
    overrides:
      backbone:
        img_size: 256
      training:
        epochs: 4
        lr: 2.5e-5
        lr_schedule: step
        lr_drop: 10
        warmup_steps: 0
      loss:
        cls_type: focal
        focal_alpha: 0.25
        focal_gamma: 2.0
        weight_cls: 2.0
        weight_bbox: 1.0
        weight_giou: 2.0
      augmentation:
        horizontal_flip: true
        color_jitter: false
        random_crop: true
        crop_min_scale: 0.6
    eval:
      suites: [in_domain]
      at_epochs: [-1]

  - name: coco_finetune
    enabled: true
    init_from: "@prev"
    train:
      img_dir: data/coco/train2017
      ann_file: data/coco/annotations/instances_train2017.json
    overrides:
      backbone:
        img_size: 256
      training:
        epochs: 12
        lr: 2.5e-5
        lr_schedule: cosine
        lr_min_ratio: 0.1
        # Paper D.9: ~2000 iterations warmup. @ bs=32, ~3696 batches/ep on full COCO → completes in <1 ep.
        warmup_steps: 2000
      loss:
        cls_type: ia_bce
        focal_alpha: 0.25
        focal_gamma: 2.0
        weight_cls: 2.0
        weight_bbox: 1.0
        weight_giou: 4.0
      augmentation:
        horizontal_flip: true
        color_jitter: false
        random_crop: true
        crop_min_scale: 0.6
    eval:
      suites: [in_domain, robustness]
      at_epochs: [4, 8, 12]
